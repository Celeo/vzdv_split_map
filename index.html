<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZDV Enroute Sectors</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #e0e0e0;
    }

    .toggle-group {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #0f3460;
    }

    .toggle-group button {
      padding: 6px 18px;
      border: none;
      background: #1a1a2e;
      color: #aaa;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-group button.active {
      background: #0f3460;
      color: #fff;
    }

    .toggle-group button:hover:not(.active) {
      background: #222244;
      color: #ddd;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      font-size: 0.78rem;
      color: #888;
      flex-wrap: wrap;
    }

    .legend-label {
      color: #666;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      opacity: 0.75;
      border: 1px solid rgba(255,255,255,0.2);
    }

    #map {
      flex: 1;
    }

    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      border-radius: 6px;
    }

    .leaflet-popup-tip {
      background: #16213e;
    }

    .sector-popup {
      font-size: 0.9rem;
      line-height: 1.7;
      min-width: 150px;
    }

    .sector-popup .sector-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #7eb8f7;
      margin-bottom: 2px;
    }

    .sector-popup .sector-meta {
      font-size: 0.78rem;
      color: #aaa;
    }

    .sector-popup .sector-freq {
      font-size: 0.85rem;
      color: #ccc;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <header>
    <h1>ZDV &mdash; Denver Center Enroute Sectors</h1>
    <div class="toggle-group">
      <button id="btn-high" class="active" onclick="showBand('high')">High (FL270&ndash;FL600)</button>
      <button id="btn-low" onclick="showBand('low')">Low (SFC&ndash;FL260)</button>
      <button id="btn-both" onclick="showBand('both')">Both</button>
    </div>
    <div class="legend" id="legend"></div>
  </header>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Area colors — consistent across high and low bands
    const AREA_COLORS = {
      1: '#ef5350',  // red       (low only)
      2: '#66bb6a',  // green
      3: '#ffa726',  // orange
      4: '#42a5f5',  // blue      (high only)
      5: '#e91e63',  // pink
      6: '#fdd835',  // yellow
    };

    const AREA_NAMES = {
      1: 'Area 1', 2: 'Area 2', 3: 'Area 3',
      4: 'Area 4', 5: 'Area 5', 6: 'Area 6',
    };

    // Source: VATSIM ZDV vERAM Enroute SOP, Section 4
    const SECTOR_INFO = {
      low: {
        6:  { name: 'RLG',   area: 1, freq: '128.65' },
        7:  { name: 'TXC',   area: 2, freq: '133.95' },
        11: { name: 'GJT',   area: 1, freq: '120.47' },
        12: { name: 'GUC',   area: 1, freq: '125.35' },
        13: { name: 'TOMSN', area: 1, freq: '126.50' },
        15: { name: 'SNY',   area: 5, freq: '118.47' },
        19: { name: 'LBF',   area: 2, freq: '132.50' },
        21: { name: 'CYS',   area: 6, freq: '125.90' },
        22: { name: 'CPR',   area: 6, freq: '132.10' },
        26: { name: 'POWDR', area: 1, freq: '119.85' },
        27: { name: 'LHX',   area: 3, freq: '133.40' },
        31: { name: 'RAP',   area: 5, freq: '127.95' },
        36: { name: 'FMN',   area: 1, freq: '118.57' },
        41: { name: 'PUB',   area: 3, freq: '128.37' },
        68: { name: 'TBC',   area: 1, freq: '127.55' },
        77: { name: 'UFN',   area: 1, freq: null },
      },
      high: {
        3:  { name: 'EKR',   area: 6, freq: '126.725' },
        4:  { name: 'GJT',   area: 6, freq: '135.125' },
        5:  { name: 'RLG',   area: 6, freq: '132.850' },
        8:  { name: 'HCT',   area: 2, freq: '127.025' },
        9:  { name: 'LBF',   area: 5, freq: '126.325' },
        14: { name: 'CHE',   area: 6, freq: '128.325' },
        16: { name: 'DEN',   area: 5, freq: '120.575' },
        17: { name: 'HLC',   area: 2, freq: '127.650' },
        23: { name: 'TBC',   area: 4, freq: '118.225' },
        25: { name: 'HBU',   area: 4, freq: '133.525' },
        28: { name: 'LAA',   area: 3, freq: '134.125' },
        29: { name: 'PUB',   area: 3, freq: '132.225' },
        32: { name: 'RAP',   area: 5, freq: '133.675' },
        33: { name: 'BFF',   area: 5, freq: '134.575' },
        34: { name: 'MBW',   area: 6, freq: '133.175' },
        35: { name: 'BRUIT', area: 5, freq: '135.025' },
        37: { name: 'FMN',   area: 4, freq: '125.675' },
        61: { name: 'FOF',   area: 2, freq: '126.875' },
      },
    };

    const map = L.map('map', {
      center: [40.5, -104.5],
      zoom: 6,
      zoomControl: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    let lowLayer = null;
    let highLayer = null;
    let labelLayers = { low: [], high: [] };
    let currentBand = 'high';

    function polygonCentroid(coords) {
      const ring = coords[0];
      let lat = 0, lng = 0;
      for (const [lo, la] of ring) { lng += lo; lat += la; }
      return [lat / ring.length, lng / ring.length];
    }

    function buildLayer(features, band) {
      const labels = [];

      const layer = L.geoJSON({ type: 'FeatureCollection', features }, {
        style: (feature) => {
          const info = SECTOR_INFO[band][feature.properties.id];
          const color = info ? AREA_COLORS[info.area] : '#888';
          return {
            color: '#fff',
            weight: 1,
            opacity: 0.45,
            fillColor: color,
            fillOpacity: 0.28,
          };
        },
        onEachFeature: (feature, lyr) => {
          const { id, alt_lo, alt_hi } = feature.properties;
          const info = SECTOR_INFO[band][id] || {};
          const flLo = alt_lo === 0 ? 'SFC' : `FL${String(alt_lo).padStart(3,'0')}`;
          const flHi = `FL${String(alt_hi).padStart(3,'0')}`;
          const bandLabel = band === 'high' ? 'H' : 'L';
          const areaColor = info.area ? AREA_COLORS[info.area] : '#888';

          lyr.on('mouseover', () => lyr.setStyle({ fillOpacity: 0.6, weight: 2, opacity: 0.95 }));
          lyr.on('mouseout',  () => lyr.setStyle({ fillOpacity: 0.28, weight: 1, opacity: 0.45 }));

          const freqLine = info.freq
            ? `<div class="sector-freq">${info.freq}</div>`
            : (id === 77 ? `<div class="sector-meta">Combined w/ 11 UFN</div>` : '');

          lyr.bindPopup(`
            <div class="sector-popup">
              <div class="sector-title" style="color:${areaColor}">
                ${id}${info.name ? `&ndash;${info.name}` : ''}-${bandLabel}
              </div>
              <div class="sector-meta">${flLo} &ndash; ${flHi}</div>
              ${info.area ? `<div class="sector-meta">${AREA_NAMES[info.area]}</div>` : ''}
              ${freqLine}
            </div>
          `);

          const coords = feature.geometry.coordinates;
          const [lat, lng] = polygonCentroid(coords);
          const label = L.marker([lat, lng], {
            icon: L.divIcon({
              className: '',
              html: `<div style="
                color:#fff;
                font-size:10px;
                font-weight:700;
                font-family:-apple-system,sans-serif;
                text-shadow:0 0 3px #000,0 0 6px #000,0 0 10px #000;
                white-space:nowrap;
                pointer-events:none;
                transform:translate(-50%,-50%);
                text-align:center;
                line-height:1.3;
              ">${id}${info.name ? `<br><span style="font-size:9px;opacity:0.85">${info.name}</span>` : ''}</div>`,
              iconSize: [0, 0],
              iconAnchor: [0, 0],
            }),
            interactive: false,
          });
          labels.push(label);
        },
      });

      return { layer, labels };
    }

    function buildLegend(band) {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';

      const areasInBand = new Set();
      const infoMap = SECTOR_INFO[band] || {};
      if (band === 'both') {
        Object.values(SECTOR_INFO.low).forEach(i => areasInBand.add(i.area));
        Object.values(SECTOR_INFO.high).forEach(i => areasInBand.add(i.area));
      } else {
        Object.values(infoMap).forEach(i => areasInBand.add(i.area));
      }

      const label = document.createElement('span');
      label.className = 'legend-label';
      label.textContent = 'Areas:';
      legend.appendChild(label);

      [...areasInBand].sort().forEach(area => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
          <div class="legend-swatch" style="background:${AREA_COLORS[area]};"></div>
          <span>${area}</span>
        `;
        legend.appendChild(item);
      });
    }

    fetch('zdv.geojson')
      .then(r => r.json())
      .then(data => {
        const lowFeatures  = data.features.filter(f => f.properties.alt_hi <= 260);
        const highFeatures = data.features.filter(f => f.properties.alt_lo >= 270);

        const low  = buildLayer(lowFeatures,  'low');
        const high = buildLayer(highFeatures, 'high');

        lowLayer  = low.layer;
        highLayer = high.layer;
        labelLayers = { low: low.labels, high: high.labels };

        showBand('high');
      })
      .catch(err => {
        console.error('Failed to load zdv.geojson:', err);
        document.querySelector('header').insertAdjacentHTML('beforeend',
          '<span style="color:#f44;font-size:0.8rem;">Error loading GeoJSON</span>'
        );
      });

    function clearMap() {
      if (lowLayer)  map.removeLayer(lowLayer);
      if (highLayer) map.removeLayer(highLayer);
      for (const band of ['low', 'high']) {
        labelLayers[band].forEach(l => map.removeLayer(l));
      }
    }

    function showBand(band) {
      currentBand = band;
      clearMap();

      document.getElementById('btn-low').classList.toggle('active',  band === 'low'  || band === 'both');
      document.getElementById('btn-high').classList.toggle('active', band === 'high' || band === 'both');
      document.getElementById('btn-both').classList.toggle('active', band === 'both');

      if ((band === 'low'  || band === 'both') && lowLayer)  { lowLayer.addTo(map);  labelLayers.low.forEach(l  => l.addTo(map)); }
      if ((band === 'high' || band === 'both') && highLayer) { highLayer.addTo(map); labelLayers.high.forEach(l => l.addTo(map)); }

      buildLegend(band);
    }
  </script>
</body>
</html>
